services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    volumes:
      - .:/app  # Mount the current directory into /app for live code changes
      - ./static:/app/static
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.develop
    ports:
      - "8020:8020"

  imgproxy:
    image: darthsim/imgproxy:v3
    restart: always
    environment:
      - IMGPROXY_KEY=${IMGPROXY_KEY:-943b421c9eb07c830af81030552c86009268de4e532ba2ee2eab8247c6da0881}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-520f986b998545b4785e0defbc4f3c1203f22de2374a3d53cb7a7fe9fea309c5}
      - IMGPROXY_AUTO_WEBP=true
      - IMGPROXY_AUTO_AVIF=true
      - IMGPROXY_MAX_SRC_DIMENSION=8192
      - IMGPROXY_QUALITY=80
      - IMGPROXY_JPEG_PROGRESSIVE=true
      - IMGPROXY_PNG_INTERLACED=true
      - IMGPROXY_WATERMARK_OPACITY=0.01
      - IMGPROXY_CACHE_CONTROL_PASSTHROUGH=true
    ports:
      - "8080:8080"
    volumes:
      - ./media:/images:ro  # Read-only access to media files

  # nginx:
  #   image: nginx:alpine
  #   restart: always
  #   depends_on:
  #     - web
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf
  #     - static_volume:/app/static
  #     - media_volume:/app/media
  #     - .:/app  # Share the code with nginx for access to static files during development

volumes:
  static_volume:
  media_volume: 